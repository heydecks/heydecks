name: Publish to npm

# Publishes the package when you create a GitHub Release (or run this manually).
# One-time setup: create an npm automation token (npmjs.com -> Access Tokens),
# then add it to this repo as a secret named NPM_TOKEN
# (Settings -> Secrets and variables -> Actions).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      # `npm ci` here installs devDeps (typescript), so the build in
      # prepublishOnly has a compiler. CI is not a publish-omit context.
      - run: npm ci
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
